<!DOCTYPE html>
<html>
<head>
<title>Average Exchange Rate Calculator</title>
<meta name="google-site-verification" content="PkLa_ViOo6FAHpvh8SacceMb95o9tePRdrqLNBz9X1M" />
<link rel="stylesheet" href="../style.css">
</head>
<body>

<h1>Average Exchange Rate Calculator</h1>

<input id="a" placeholder="Value A">
<input id="b" placeholder="Value B or Date">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<a href="../index.html">← Back</a>

<script>
function calc(){let a1=+a.value||0;let b1=+b.value||0;res.innerText=((a1+b1)/2).toFixed(4);} 
</script>

</body>
</html>
